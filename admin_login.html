<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 350px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .sub {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 2px;
        }

        input:focus {
            outline: none;
            border-color: #4ecdc4;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #4ecdc4;
            color: #1a1a2e;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff6b6b;
            transform: scale(1.02);
        }

        .error {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 0.8rem;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #4ecdc4;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🔒 Admin Access</h1>
        <p class="sub">Masukkan password untuk melanjutkan</p>
        
        <input type="password" id="passwordInput" placeholder="Password" autofocus>
        <button onclick="checkPassword()">Login</button>
        
        <div id="errorMsg" class="error"></div>
        <a href="index.html" class="back-link">← Kembali</a>
    </div>

    <script>
        const CORRECT_PASSWORD = "Amirah27102009";

        function checkPassword() {
            const inputPass = document.getElementById('passwordInput').value;
            
            if (inputPass === CORRECT_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'index_admin.html';
            } else {
                document.getElementById('errorMsg').innerText = '❌ Password salah!';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
